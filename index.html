<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>The Apolo Gym</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" type="image/webp" href="apolo/img/logo-real-clean.webp" />
<link rel="apple-touch-icon" href="apolo/img/logo-real-clean.webp" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #201E1C;
    --bg-2: #2C2A28;
    --ink: #f5f5f0;
    --ink-mute: #bdbdb5;
    --ink-dim: #7a7a72;
    --rule: rgba(245,245,240,0.12);
    --orange: #F7A703;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html { scroll-behavior: smooth; scroll-padding-top: 88px; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); }
  body {
    font-family: 'Archivo', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  img { max-width: 100%; display: block; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; }

  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .anton { font-family: 'Anton', 'Archivo', sans-serif; }
  .bebas { font-family: 'Bebas Neue', 'Archivo', sans-serif; }
  .cormorant { font-family: 'Cormorant Garamond', Georgia, serif; }

  .page { width: 1440px; margin: 0 auto; }

  @keyframes marquee {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
  .marquee-track {
    display: flex; gap: 48px; white-space: nowrap;
    animation: marquee 40s linear infinite;
    padding-right: 48px;
  }

  /* ─────────────── RESPONSIVE ─────────────── */

  /* Page becomes fluid below the design width */
  @media (max-width: 1440px) {
    .page { width: 100%; max-width: 1440px; }
  }

  /* Catalog grid: 4 → 3 → 2 → 1 columns (used on maquinas.html) */
  .catalog-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
  @media (max-width: 1100px) {
    .catalog-grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 768px) {
    .catalog-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
  }
  @media (max-width: 420px) {
    .catalog-grid { grid-template-columns: 1fr; }
  }


  /* Mobile */
  @media (max-width: 768px) {
    html { scroll-padding-top: 72px; }

    /* Header: tighter padding, hide the 8-link menu and logo subtext */
    .page > header { padding: 12px 16px !important; gap: 8px !important; }
    .nav-menu-desktop { display: none !important; }
    .nav-logo-sub { display: none !important; }
    .nav-cta { padding: 10px 14px !important; font-size: 10px !important; letter-spacing: 0.16em !important; }
    .nav-tel { font-size: 9px !important; }

    /* Section padding */
    .page > section, .page > footer {
      padding-left: 20px !important;
      padding-right: 20px !important;
    }
    #nosotros, #naves, #maquinas, #actividades, #planes, #horario {
      padding-top: 72px !important;
      padding-bottom: 72px !important;
    }
    #contacto { padding-top: 56px !important; padding-bottom: 24px !important; }

    /* Hero: collapse the inner grid + adjust aside */
    #inicio > div[style*="grid-template-columns"] {
      padding: 28px 20px 32px !important;
      gap: 32px !important;
      min-height: 0 !important;
    }
    #inicio aside {
      border-left: none !important;
      border-top: 1px solid var(--rule) !important;
      padding-left: 0 !important;
      padding-top: 28px !important;
    }
    .hero-greek-label { display: none !important; }

    /* Stack top-level section grids to 1 col */
    .page section > div[style*="grid-template-columns"],
    .page footer > div[style*="grid-template-columns"] {
      grid-template-columns: 1fr !important;
      gap: 32px !important;
    }

    /* Nosotros: paragraphs + achievements (4 cols → 2) */
    #nosotros div[style*="grid-template-columns: 1fr 1fr"] {
      grid-template-columns: 1fr !important;
      gap: 24px !important;
    }
    #nosotros div[style*="repeat(4"] {
      grid-template-columns: 1fr 1fr !important;
    }

    /* Maquinas: categories 4 cols → 2 cols */
    #maquinas div[style*="repeat(4"] {
      grid-template-columns: 1fr 1fr !important;
    }

    /* Naves address strip: stack vertically */
    #naves > div[style*="space-between"][style*="border:"] {
      flex-direction: column !important;
      align-items: flex-start !important;
      gap: 10px !important;
    }

    /* Footer 4-col block → stacked */
    #contacto > div[style*="grid-template-columns"] {
      grid-template-columns: 1fr !important;
      gap: 32px !important;
    }
    /* Footer logo scales with viewport */
    #contacto img { width: clamp(64px, 18vw, 140px) !important; height: clamp(64px, 18vw, 140px) !important; }

    /* Marquee: smaller text */
    .marquee-track > .anton { font-size: 22px !important; }
  }
</style>
</head>
<body>

<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>

<div id="apolo-root"></div>

<script type="text/babel" src="apolo/Logo.jsx"></script>
<script type="text/babel" src="apolo/Nav.jsx"></script>
<script type="text/babel" src="apolo/Hero.jsx"></script>
<script type="text/babel" src="apolo/Marquee.jsx"></script>
<script type="text/babel" src="apolo/Manifiesto.jsx"></script>
<script type="text/babel" src="apolo/Nosotros.jsx"></script>
<script type="text/babel" src="apolo/Naves.jsx"></script>
<script type="text/babel" src="apolo/Maquinas.jsx"></script>
<script type="text/babel" src="apolo/Actividades.jsx"></script>
<script type="text/babel" src="apolo/Planes.jsx"></script>
<script type="text/babel" src="apolo/Horario.jsx"></script>
<script type="text/babel" src="apolo/Footer.jsx"></script>
<script type="text/babel" src="apolo/Landing.jsx"></script>

</body>
</html>
