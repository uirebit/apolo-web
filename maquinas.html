    <h1>Catálogo de máquinas · Apolo Gimnasio Aranjuez</h1>
    <p>Más de 180 máquinas distribuidas en tres naves. <strong>El 90% del parque selectorizado es Nautilus</strong>, la marca de referencia americana en máquinas de musculación. Cada máquina tiene mantenimiento mensual y se sustituye cuando deja de cumplir.</p>

    <h2>Por categoría</h2>
    <ul>
      <li><strong>Fuerza · tren superior</strong> — barras olímpicas, power racks, mancuernas hexagonales hasta 70 kg, press banca olímpico, inclinado y declinado, banco Scott, jaula de sentadilla.</li>
      <li><strong>Pierna · tren inferior</strong> — hack squat, prensa 45º, prensa horizontal, prensa vertical, leg curl tumbado y sentado, leg extension, aductor / abductor, gemelo de pie, gemelo sentado Nautilus, plataforma de sentadilla, torre de sentadillas.</li>
      <li><strong>Pecho</strong> — pec deck, press pecho selectorizado, press inclinado convergente.</li>
      <li><strong>Espalda</strong> — pull-down vertical, remo en T, remo selectorizado, pull-over selectorizado.</li>
      <li><strong>Hombro y brazo</strong> — press hombro selectorizado, elevación lateral máquina, curl bíceps Scott, press francés máquina.</li>
      <li><strong>Poleas y cables</strong> — polea alta, polea baja, polea cruzada, doble torre.</li>
      <li><strong>Cardio</strong> — cintas, elípticas, remos, stair, bicicletas y assault bike.</li>
      <li><strong>Strongman</strong> — yugo, atlas stones, farmer walk, prowler, sled.</li>
    </ul>
