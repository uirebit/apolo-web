    <h1>Actividades dirigidas · Apolo Gimnasio Aranjuez</h1>
    <p>Movilidad, ritmo y comunidad. Las actividades dirigidas complementan la sala de fuerza con horarios cerrados y plazas limitadas. Reserva por teléfono en el <a href="tel:+34910945909">910 945 909</a>.</p>

    <h2>Pilates</h2>
    <p><strong>Instructora:</strong> Laura Díaz · @pilates_lauradiaz. Sala dedicada con reformer y trapecio. Grupos reducidos para movilidad, control y prevención de lesiones. Sesión específica para embarazadas martes y jueves a las 12:00 H.</p>
    <p><strong>Horarios:</strong> lunes y miércoles 17—21 H · martes y jueves 09—13 / 17—21 H · plazas extra lunes y viernes 10—13 H.</p>

    <h2>Salsa</h2>
    <p>Clases para todos los niveles. Ritmo, coordinación y comunidad sin necesidad de pareja. Horarios disponibles en recepción.</p>

    <h2>Pole Dance</h2>
    <p><strong>Instructora:</strong> Natalia Gárate · <a href="https://instagram.com/cocostudiodance" rel="noopener">@cocostudiodance</a>. Pole dance, exotic y acrobático en colaboración con el estudio Coco Dance. Fuerza, flexibilidad y creatividad sobre la barra. Horarios en <a href="https://cocodance.es/" rel="noopener">cocodance.es</a>.</p>

    <h2>Reservas</h2>
    <p>Reserva de plaza por teléfono · <a href="tel:+34910945909">910 945 909</a>. <a href="index.html">Volver a la portada</a>.</p>
